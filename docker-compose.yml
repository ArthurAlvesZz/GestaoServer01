version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: gestaoos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: gestaoos_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d gestaoos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
